<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Project 52 Phase 2 | Auth Client</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div class="container">
            <h2>Client Login</h2>
            <input type="text" id="username" placeholder="Username" value="admin">
            <input type="password" id="password" placeholder="Password" value="supersecretpassword">

            <button onclick="login()">Log In & Get Token</button>
            <button class="btn-success" onclick="accessDashboard()">Access VIP Dashboard</button>
            <button class="btn-danger" onclick="logout()">Log Out (Delete Token)</button>

            <div id="output">Server Response will appear here...</div>
        </div>

        <script src="script.js" async defer></script>
    </body>
</html>
