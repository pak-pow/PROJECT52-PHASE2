<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 52 | Auth Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Client Login</h2>
        
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="supersecretpassword">
        
        <button id="loginBtn" class="btn-primary">Log In & Get Token</button>
        <button id="registerBtn" class="btn-warning">Create A New Account</button>
        <button id="dashboardBtn" class="btn-success">Access VIP Dashboard</button>
        <button id="logoutBtn" class="btn-danger">Log Out (Delete Token)</button>

        <div id="output">Server Response</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
