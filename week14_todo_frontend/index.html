<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?">
            <button id="addBtn">Add Task</button>
        </div>

        <div class="action-bar">
            <input type="text" id="searchInput" placeholder="Search task...">
            <button id="clearCompletedBtn" class="clear-btn" title="Delete all completed tasks">Clear</button>
        </div>

        <div class="filters">
            <button id="filterAll" class="filter-btn active">All</button> 
            <button id="filterClear" class="filter-btn">Active</button>
            <button id="filterCompleted" class="filter-btn">Completed</button>
        </div>
        
        <ul id="todoList">
            </ul>
    </div>
    <div id="toast-container"></div>
    
    <script src="app.js"></script>
</body>
</html>
